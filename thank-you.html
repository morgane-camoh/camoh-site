<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camōh House</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #e1e0da;
      --text: #2b2b2b;
      --primary: #9c745b;
      --walnut: #573923;
      --card: #f8f6f2;
      --shadow: 0 18px 40px rgba(43, 43, 43, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: "Inter", sans-serif;
    }

    .card {
      max-width: 680px;
      width: 100%;
      background: rgba(248, 246, 242, 0.95);
      border-radius: 24px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: var(--shadow);
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(2.5rem, 5vw, 4rem);
      line-height: 0.98;
      font-weight: 600;
    }

    p {
      margin: 18px auto 0;
      max-width: 520px;
      line-height: 1.75;
      color: rgba(43, 43, 43, 0.8);
    }

    .actions {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--primary);
      color: #f8f6f2;
      font-weight: 600;
      transition: all 0.25s ease;
    }

    .btn:hover {
      background: var(--walnut);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1px solid rgba(87,57,35,0.16);
    }

    .btn-secondary:hover {
      background: rgba(156,116,91,0.08);
      color: var(--walnut);
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>You’re on the list</h1>
    <p>
      Thank you for joining the Camōh waitlist. We’ll be in touch soon with opening news, early access and first class releases.
    </p>

    <div class="actions">
      <a class="btn" href="https://www.instagram.com/camoh.house/" target="_blank" rel="noopener noreferrer">Follow us on Instagram</a>
      <a class="btn btn-secondary" href="/">Back to homepage</a>
    </div>
  </div>
</body>
</html>
